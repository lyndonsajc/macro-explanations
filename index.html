<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Macro Explanation App</title>


<style>
:root{
  --navy:#111827;
  --navy2:#0f2742;
  --bg:#10183a;
  --card:#f8fafc;
  --glass:rgba(255,255,255,.88);
  --text:#111827;
  --muted:#64748b;
  --line:#e5e7eb;
  --blue:#2563eb;
  --cyan:#06b6d4;
  --purple:#7c3aed;
  --pink:#ec4899;
  --orange:#f97316;
  --yellow:#facc15;
  --green:#16a34a;
  --red:#dc2626;
  --shadow:0 24px 60px rgba(0,0,0,.25);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Segoe UI",Arial,Helvetica,sans-serif;
  background:
    radial-gradient(circle at 18% 18%, rgba(124,58,237,.35), transparent 28%),
    radial-gradient(circle at 86% 20%, rgba(14,165,233,.35), transparent 28%),
    linear-gradient(135deg,#121226,#142554 55%,#0b4a6f);
  color:var(--text);
}
.app{min-height:100vh}
header{
  position:sticky;
  top:0;
  z-index:20;
  background:linear-gradient(90deg,#111827,#121a3a 50%,#0f2f4a);
  color:white;
  padding:16px 24px 20px;
  box-shadow:0 10px 30px rgba(0,0,0,.28);
}
h1{
  margin:0;
  font-size:30px;
  line-height:1;
  letter-spacing:-.04em;
  font-weight:950;
  display:flex;
  align-items:center;
  gap:12px;
}
h1:before{content:"🚀";font-size:31px}
.sub{margin-top:12px;color:#d1d5db;font-size:15px;font-weight:600}
.layout{
  display:grid;
  grid-template-columns:360px 1fr;
  gap:20px;
  padding:22px 28px;
  min-height:calc(100vh - 96px);
}
.side{
  background:rgba(255,255,255,.9);
  border:1px solid rgba(255,255,255,.8);
  border-radius:28px;
  box-shadow:var(--shadow);
  padding:22px;
  align-self:start;
  position:sticky;
  top:118px;
  max-height:calc(100vh - 140px);
  overflow:auto;
}
.main{
  background:rgba(248,250,252,.94);
  border:1px solid rgba(255,255,255,.85);
  border-radius:32px;
  box-shadow:var(--shadow);
  padding:28px;
  min-height:76vh;
  position:relative;
  overflow:hidden;
}
.main:after{
  content:"📈";
  position:absolute;
  right:34px;
  top:42px;
  font-size:82px;
  opacity:.06;
  transform:rotate(-10deg);
  pointer-events:none;
}
.search{
  width:100%;
  padding:17px 18px;
  border:2px solid transparent;
  border-radius:18px;
  background:
    linear-gradient(white,white) padding-box,
    linear-gradient(90deg,#8b5cf6,#22c55e,#06b6d4) border-box;
  font-size:16px;
  outline:none;
  margin-bottom:22px;
}
.search:focus{box-shadow:0 0 0 5px rgba(34,211,238,.18)}
.cat{
  font-size:14px;
  font-weight:950;
  text-transform:uppercase;
  letter-spacing:.08em;
  margin:24px 4px 12px;
  color:#4338ca;
  display:flex;
  gap:8px;
  align-items:center;
}
.cat:before{content:"✨";font-size:16px}
.cat[data-cat="Core Process"]:before{content:"🔁"}
.cat[data-cat="Inflation"]:before{content:"🔥"}
.cat[data-cat="Unemployment"]:before{content:"🧰"}
.cat[data-cat="Economic Growth"]:before{content:"📈"}
.cat[data-cat="Exchange Rate Policy"]:before{content:"💱"}
.cat[data-cat="Monetary Policy"]:before{content:"🏦"}
.cat[data-cat="Fiscal Policy"]:before{content:"🏛️"}
.cat[data-cat="Supply-Side Policy"]:before{content:"⚙️"}
button.item{
  width:100%;
  text-align:left;
  border:none;
  background:rgba(255,255,255,.86);
  border-radius:22px;
  padding:17px 18px;
  margin:12px 0;
  cursor:pointer;
  transition:.16s;
  box-shadow:0 12px 28px rgba(15,23,42,.08);
  color:#111827;
  font-size:16px;
  line-height:1.25;
}
button.item:hover{
  transform:translateY(-2px);
  background:linear-gradient(90deg,#ffffff,#eff6ff);
  box-shadow:0 18px 34px rgba(37,99,235,.18);
}
button.item.active{
  background:linear-gradient(120deg,#faf5ff,#ecfeff);
  color:#3b0764;
  outline:2px solid #a78bfa;
  font-weight:900;
}
button.item small, button.item .mini{display:block;color:#64748b;font-size:12px;margin-top:6px;font-weight:700}
.toprow{
  display:flex;
  justify-content:space-between;
  gap:18px;
  align-items:flex-start;
  margin-bottom:26px;
}
.tag{
  display:inline-flex;
  align-items:center;
  background:linear-gradient(90deg,#f97316,#facc15);
  color:#111827;
  border-radius:999px;
  padding:10px 16px;
  font-size:13px;
  font-weight:950;
  margin-bottom:14px;
}
.title{
  font-size:43px;
  font-weight:950;
  margin:0 0 10px;
  line-height:1.02;
  letter-spacing:-.055em;
  color:#111827;
}
.use{
  max-width:780px;
  font-size:19px;
  color:#526179;
  line-height:1.35;
  margin:0;
}
.controls{display:flex;gap:10px;flex-wrap:wrap;position:relative;z-index:2}
.smallbtn,.modebtn{
  width:auto;
  border:none;
  border-radius:16px;
  padding:14px 17px;
  cursor:pointer;
  color:white;
  font-weight:950;
  font-size:15px;
  background:linear-gradient(135deg,#6366f1,#06b6d4);
  box-shadow:0 14px 26px rgba(37,99,235,.25);
  transition:.16s;
}
.smallbtn:hover,.modebtn:hover{transform:translateY(-2px)}
.modebar{display:flex;gap:12px;flex-wrap:wrap;margin:8px 0 20px}
.modebtn{background:#e5e7eb;color:#475569;box-shadow:none;min-width:180px}
.modebtn.active{
  color:white;
  background:linear-gradient(135deg,#2563eb,#7c3aed,#06b6d4);
  box-shadow:0 14px 30px rgba(37,99,235,.28);
}
.grid,.specialgrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  position:relative;
  z-index:1;
}
.panel{
  background:rgba(255,255,255,.88);
  border:1px solid rgba(226,232,240,.95);
  border-radius:24px;
  min-height:190px;
  overflow:hidden;
  position:relative;
  box-shadow:0 16px 38px rgba(15,23,42,.08);
}
.panel:before{
  content:"";
  display:block;
  height:10px;
  background:linear-gradient(90deg,#7c3aed,#06b6d4,#22c55e,#f97316);
}
.panel h3{
  margin:0;
  padding:22px 24px 12px;
  font-size:21px;
  font-weight:950;
  color:#111827;
  background:transparent;
  border:0;
}
.panel:nth-child(1) h3:before,
.panel:nth-child(2) h3:before,
.panel:nth-child(3) h3:before,
.panel:nth-child(4) h3:before{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:34px;height:34px;
  border-radius:50%;
  color:white;
  margin-right:11px;
  font-size:16px;
  font-weight:950;
  background:#111827;
}
.panel:nth-child(1) h3:before{content:"1";background:#111827}
.panel:nth-child(2) h3:before{content:"2";background:#111827}
.panel:nth-child(3) h3:before{content:"3";background:#111827}
.panel:nth-child(4) h3:before{content:"4";background:#111827}
.fullpanel{grid-column:1/-1}
ol.steps{
  margin:0;
  padding:8px 24px 24px;
  counter-reset:step;
  list-style:none;
}
.steps li{
  counter-increment:step;
  margin:10px 0;
  padding:12px 14px 12px 50px;
  border:1px solid #e5e7eb;
  border-radius:18px;
  background:rgba(255,255,255,.72);
  line-height:1.32;
  font-size:17px;
  position:relative;
  color:#1f2937;
}
.steps li:before{
  content:counter(step);
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  width:27px;height:27px;
  border-radius:50%;
  background:#111827;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:950;
  font-size:14px;
}
.note{
  margin-top:22px;
  padding:17px 20px;
  border-radius:22px;
  background:linear-gradient(90deg,#fff7ed,#fef3c7);
  border:1px solid #fed7aa;
  color:#7c2d12;
  font-size:15px;
  line-height:1.42;
  position:relative;
  z-index:1;
}
.note:before{content:"💡 ";font-size:18px}
.highlight{
  color:#991b1b;
  background:#fee2e2;
  font-weight:950;
  padding:2px 6px;
  border-radius:8px;
}
.green{
  color:#166534;
  background:#dcfce7;
  font-weight:950;
  padding:2px 6px;
  border-radius:8px;
}
.copybox{
  white-space:pre-wrap;
  background:#0f172a;
  color:#e5e7eb;
  border-radius:20px;
  padding:18px;
  display:none;
  margin-top:16px;
  overflow:auto;
  max-height:360px;
  font-family:Consolas,monospace;
  font-size:13px;
  position:relative;
  z-index:2;
}
.empty{
  min-height:60vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#64748b;
  text-align:center;
  font-size:20px;
}
.empty:before{content:"🎮 Choose your mission from the left";font-weight:950}
@media(max-width:950px){
  .layout{grid-template-columns:1fr;padding:14px}
  .side{position:relative;top:0;max-height:none}
  .grid,.specialgrid{grid-template-columns:1fr}
  .fullpanel{grid-column:auto}
  .title{font-size:32px}
  .main{padding:18px}
}
</style>


</head>

const menu=document.getElementById('menu'), main=document.getElementById('main'), search=document.getElementById('search'); let active=0;
function renderMenu(){const q=search.value.toLowerCase();menu.innerHTML='';[...new Set(DATA.map(d=>d.category))].forEach(cat=>{const items=DATA.map((d,i)=>({...d,i})).filter(d=>d.category===cat&&(d.title.toLowerCase().includes(q)||d.subtitle.toLowerCase().includes(q)||d.category.toLowerCase().includes(q)));if(!items.length)return;const h=document.createElement('div');h.className='cat';h.setAttribute('data-cat',cat);h.textContent=cat;menu.appendChild(h);items.forEach(d=>{const b=document.createElement('button');b.className='item'+(d.i===active?' active':'');b.innerHTML=d.title + (d.subtitle ? '<small>'+d.subtitle+'</small>' : '');b.onclick=()=>{active=d.i;renderMenu();renderMain();window.scrollTo({top:0,behavior:'smooth'})};menu.appendChild(b)})})}
function format(s){return s
.replace(/\bincreases\b|\bincrease\b|\bincreased\b|\bincreasing\b|\brises\b|\brise\b/gi,'<span class="green">rise</span>')
.replace(/\bdecreases\b|\bdecrease\b|\bdecreased\b|\bdecreasing\b|\bfalls\b|\bfall\b/gi,'<span class="highlight">fall</span>')
.replace(/\brecession\b/gi,'<span class="highlight">recession</span>')
.replace(/\bmismatch\b/gi,'<span class="highlight">mismatch</span>')
.replace(/\bmultiplied\b/gi,'<span class="highlight">multiplied</span>')
.replace(/\bJ = W\b/g,'<span class="highlight">J = W</span>')}
function listHTML(arr){return '<ol class="steps">'+arr.map(s=>'<li>'+format(s)+'</li>').join('')+'</ol>'}
function plain(d){return `${d.title}\n${d.subtitle}\n\n`+SECTION_TITLES.map((t,i)=>`${t}\n- ${(d.sections[i]||[]).join('\n- ')}`).join('\n\n')}

const MODE_STATE = {};

function renderSpecialMain(d){
  const key = d.title;
  const mode = MODE_STATE[key] || d.defaultMode;

  if(d.modeType === 'circular'){
    const info = d.modes[mode];
    const isJgtW = mode === 'jgtw';
    main.innerHTML = `
      <div class="toprow">
        <div>
          <span class="tag">${d.category}</span>
          <h2 class="title">${d.title}</h2>
          <p class="use">${d.subtitle}</p>
        </div>
      </div>
      <div class="modebar">
        <button class="modebtn ${isJgtW?'active':''}" onclick="setMode('${key}','jgtw')">J &gt; W (J rise or W fall)</button>
        <button class="modebtn ${!isJgtW?'active':''}" onclick="setMode('${key}','jltw')">J &lt; W (J fall or W rise)</button>
      </div>
      <div class="specialgrid">
        <section class="panel">
          <h3>Disequilibrium in Circular Flow</h3>
          ${listHTML(info.disequilibrium)}
        </section>
        <section class="panel">
          <h3>Back to Equilibrium (${isJgtW?'J > W':'J < W'})</h3>
          ${listHTML(info.equilibrium)}
        </section>
      </div>
      <div class="note"><b>Exam use:</b> Use circular flow only when explaining injections (J), withdrawals (W), and return to equilibrium. Do not use AD-AS for this explanation.</div>
    `;
    return;
  }

  if(d.modeType === 'multiplier'){
    const arr = d.modes[mode];
    const isRise = mode === 'rise';
    main.innerHTML = `
      <div class="toprow">
        <div>
          <span class="tag">${d.category}</span>
          <h2 class="title">${d.title}</h2>
          <p class="use">${d.subtitle}</p>
        </div>
      </div>
      <div class="modebar">
        <button class="modebtn ${isRise?'active':''}" onclick="setMode('${key}','rise')">AD rise</button>
        <button class="modebtn ${!isRise?'active':''}" onclick="setMode('${key}','fall')">AD fall</button>
      </div>
      <div class="specialgrid">
        <section class="panel fullpanel">
          <h3>Multiplier Process (${isRise?'AD rise':'AD fall'})</h3>
          ${listHTML(arr)}
        </section>
      </div>
      <div class="note"><b>Exam use:</b> Complete multiplier process first, link to RNY, then explain GPL effect for AD changes.</div>
    `;
    return;
  }
}

function setMode(key, mode){
  MODE_STATE[key] = mode;
  renderMain();
}

function renderMain(){
  const d=DATA[active];
  if(d.modeType){ renderSpecialMain(d); return; }
  const panels=SECTION_TITLES.map((t,i)=>`<section class="panel"><h3>${t}</h3>${listHTML(d.sections[i]||[])}</section>`).join('');
  main.innerHTML=`<div class="toprow"><div><span class="tag">${d.category}</span><h2 class="title">${d.title}</h2><p class="use">${d.subtitle}</p></div><div class="controls"><button class="smallbtn" onclick="copyCurrent()">Copy</button><button class="smallbtn" onclick="togglePlain()">Show plain text</button></div></div><div class="grid">${panels}</div><div class="note"><b>Exam use:</b> Complete multiplier process first, link to RNY, then explain GPL effect for AD changes.</div><pre id="copybox" class="copybox">${plain(d).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}</pre>`;
}

function copyCurrent(){navigator.clipboard.writeText(plain(DATA[active]))}function togglePlain(){const b=document.getElementById('copybox');b.style.display=b.style.display==='block'?'none':'block'}
search.addEventListener('input',renderMenu);renderMenu();renderMain();
</script>
