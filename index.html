<title>Macro Essentials</title>
<style>
:root{
  --bg1:#0f172a;--bg2:#1e1b4b;--bg3:#312e81;
  --card:#ffffff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;

  --soft:#f8fafc;--shadow:0 18px 45px rgba(15,23,42,.18);
}
*{box-sizing:border-box}
html,body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,var(--bg1),var(--bg2) 52%,var(--bg3));color:var(--ink);min-height:100%}
body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 8% 12%,rgba(34,211,238,.35),transparent 24%),radial-gradient(circle at 92% 20%,rgba(244,114,182,.28),transparent 22%),radial-gradient(circle at 50% 100%,rgba(34,197,94,.18),transparent 28%);pointer-events:none;z-index:-1}
header{position:sticky;top:0;z-index:20;background:rgba(15,23,42,.78);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.12);color:white;padding:14px 18px}
.hero{display:flex;align-items:center;justify-content:space-between;gap:12px;max-width:1280px;margin:0 auto}.brand{display:flex;align-items:center;gap:12px}.logo{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,#22d3ee,#a78bfa,#fb7185);display:grid;place-items:center;font-size:27px;box-shadow:0 10px 26px rgba(0,0,0,.22)}h1{margin:0;font-size:25px;letter-spacing:-.03em}.sub{font-size:13px;opacity:.82;margin-top:2px}.pillbar{display:flex;gap:8px;flex-wrap:wrap}.pill{border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:white;border-radius:999px;padding:8px 11px;font-weight:800;font-size:12px;cursor:pointer}.pill.active{background:white;color:#111827}

:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:10px 0 14px}.stat{border-radius:19px;padding:12px;background:#fff;border:1px solid var(--line)}.stat b{display:block;font-size:11px;text-transform:uppercase;color:#64748b;letter-spacing:.06em}.stat span{font-size:20px;font-weight:950}.copybox{display:none;white-space:pre-wrap;background:#0f172a;color:#e5e7eb;border-radius:18px;padding:14px;margin-top:12px;max-height:320px;overflow:auto;font-family:Consolas,monospace;font-size:13px}.editorModal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.72);z-index:100;padding:18px}.editorModal.show{display:block}.editorPanel{height:100%;background:white;border-radius:22px;padding:14px;display:flex;flex-direction:column;gap:10px}.editorTop{display:flex;justify-content:space-between;align-items:center;gap:10px}.editorTop>div{display:flex;gap:8px}#htmlEditor{flex:1;width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;font-family:Consolas,monospace;font-size:12px;resize:none}.toast{position:fixed;right:16px;bottom:16px;background:#111827;color:white;border-radius:16px;padding:12px 16px;font-weight:900;opacity:0;transform:translateY(10px);transition:.2s;z-index:50}.toast.show{opacity:1;transform:translateY(0)}

.goalStrip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:12px 0 16px}.goal{border:1px solid var(--line);background:#fff;border-radius:18px;padding:12px}.goal b{display:block;font-size:13px;margin-bottom:4px}.goal small{color:#475569;line-height:1.25}.allSections{display:grid;grid-template-columns:1fr 1fr;gap:14px}.fullspan{grid-column:1/-1}.sectionCard{border-radius:24px;padding:16px;background:linear-gradient(135deg,#ffffff,#f8fafc);border:1px solid var(--line)}.sectionCard.goalFx{border-top:5px solid #60a5fa}.sectionCard h3{margin:0 0 12px;font-size:20px;letter-spacing:-.02em}.sectionCard .chain{gap:8px}.sectionCard .step{box-shadow:none}.sectionCard.impact{background:linear-gradient(135deg,#f8fafc,#fff)}.sectionCard.bot{border-top:5px solid #06b6d4}.sectionCard.unemp{border-top:5px solid #f59e0b}.sectionCard.growth{border-top:5px solid #22c55e}.sectionCard.infl{border-top:5px solid #fb7185}.sectionCard.diagram{border-top:5px solid #818cf8}.sectionCard.eval{border-top:5px solid #a78bfa}.scenarioNote{font-weight:900;color:#334155;margin:0 0 6px}.modebar{margin-top:8px}.modebtn{background:#fff}.homecard{min-height:120px}.logo{font-weight:950;color:white}

function fmt(s){return esc(s).replace(/\b(rise|rises|rising|increase|increases|increased|upward|right)\b/gi,'<span class="up">$1</span>').replace(/\b(fall|falls|falling|decrease|decreases|decreased|downward|left)\b/gi,'<span class="down">$1</span>').replace(/\b(multiplier|RNY|GPL|AD|SRAS|LRAS|J = W|Yf)\b/g,'<span class="hot">$1</span>')}
function categoryList(){return [...new Set(DATA.map(d=>d.category))]}
function showToast(t='Copied!'){const x=document.getElementById('toast');x.textContent=t;x.classList.add('show');setTimeout(()=>x.classList.remove('show'),1300)}
function getModeData(d){
  const m=modeState[d.title]||d.defaultMode;
  if(d.modeType==='multiplier') return {mode:m,primary:d.modes[m]||[]};
  if(d.modeType==='circular'){
    const info=d.modes[m];
    return {mode:m,primary:[...(info?.chain||[])]};
  }
  return {mode:null,primary:d.sections?.[0]||[]};
}
function splitEffects(chain){
  const growthKeys=/GDP|growth|RNY|real national|real GDP|output|income|Yf|productive capacity|LRAS|SRAS|AD rise|AD fall|multiplier|factor income|living standards/i;
  const inflationKeys=/GPL|inflation|deflation|price|prices|COP|cost of production|imported raw material|upward pressure|downward pressure|stagflation|purchasing power/i;
  const unempKeys=/unemployment|employment|employed|jobs|labour|hire|derived demand|demand for labour|worker|wage/i;
  const botKeys=/BOT|balance of trade|exports|imports|export|import|X |M |X − M|X - M|net exports|external/i;
  const out={growth:[],inflation:[],unemployment:[],bot:[]};
  (chain||[]).forEach(step=>{
    if(growthKeys.test(step) && !inflationKeys.test(step)) out.growth.push(step);
    if(inflationKeys.test(step)) out.inflation.push(step);
    if(unempKeys.test(step)) out.unemployment.push(step);
    if(botKeys.test(step)) out.bot.push(step.replace(/BOT/g,'BOT').replace(/bot/g,'bot'));
  });
  if(!out.growth.length) out.growth.push(...(chain||[]).filter(s=>!/GPL|inflation|deflation|price|prices/i.test(s)).slice(0,10));
  return out;
}
function groupedGrowthNotes(d){
  if(!/Sustained|Sustainable|Inclusive/i.test(d.title)) return [];
  const actual=['Actual growth: real GDP / RNY rises over time','Usually driven by AD rise and the multiplier process or SRAS rise','Uses unemployed or underutilised factors of production'];
  const potential=['Potential growth: productive capacity rises','Quantity / quality of FOP or technology rises','LRAS shifts right and full-employment output rises'];
  const special = /Sustainable/i.test(d.title) ? ['Sustainable condition: growth does not damage future productive capacity','Environmental degradation, resource depletion, high inflation and excessive debt must be avoided'] : /Inclusive/i.test(d.title) ? ['Inclusive condition: benefits are broad-based and shared by most groups','Employment, income and living standards rise without worsening inequality'] : ['Sustained condition: actual growth and potential growth occur together over time','LRAS rise helps prevent AD-driven inflationary pressure'];
  return ['ACTUAL GROWTH',...actual,'POTENTIAL GROWTH',...potential,d.title.toUpperCase(),...special];
}
function standard(d){
  const md=getModeData(d), primary=md.primary.map(x=>String(x).replace(/BOT/g,'BOT').replace(/bot/g,'bot'));
  if(d.modeType==='circular'){
    const info=d.modes[md.mode]||{};
    const definition=[(d.subtitle||'').replace(/BOT/g,'BOT').replace(/bot/g,'bot'), ...primary];
    const cause=(info.cause||['J > W or J < W']).map(x=>String(x).replace(/BOT/g,'BOT').replace(/bot/g,'bot'));
    const effects=info.goals||{growth:[],inflation:[],unemployment:[],bot:[]};
    const diagram=(d.sections?.[2]||[]).map(x=>String(x).replace(/BOT/g,'BOT').replace(/bot/g,'bot'));
    const evaluation=(d.sections?.[3]||[]).map(x=>String(x).replace(/BOT/g,'BOT').replace(/bot/g,'bot'));
    const exam=makeExamParagraph(d, primary);
    return [definition,cause,effects.growth||[],effects.inflation||[],effects.unemployment||[],effects.bot||[],diagram,evaluation,exam?[exam]:[]];
  }
  const definition=[(d.subtitle||'').replace(/BOT/g,'BOT').replace(/bot/g,'bot')];
  const cause=(d.sections?.[1]||[]).map(x=>String(x).replace(/BOT/g,'BOT').replace(/bot/g,'bot'));
  const effects=d.goalSections ? d.goalSections : splitEffects(primary);
  const growthExtra=groupedGrowthNotes(d);
  const diagram=(d.sections?.[2]||[]).map(x=>String(x).replace(/BOT/g,'BOT').replace(/bot/g,'bot'));
  const evaluation=(d.sections?.[3]||[]).map(x=>String(x).replace(/BOT/g,'BOT').replace(/bot/g,'bot'));
  const exam=makeExamParagraph(d, primary);
  return [definition,cause,growthExtra.length?growthExtra:(effects.growth||[]),effects.inflation||[],effects.unemployment||[],effects.bot||[],diagram,evaluation,exam?[exam]:[]];
}
function makeExamParagraph(d, chain){
  if(!chain || !chain.length) return '';
  const lead = d.subtitle ? d.subtitle.replace(/\.$/,'')+'. ' : '';
  const concise = chain.filter(Boolean).join(' → ');
  return `${d.title}: ${lead}${concise}.`;
}
function renderMenu(){
  const q=search.value.toLowerCase().trim(); menu.innerHTML='';
  categoryList().forEach(cat=>{
    const items=DATA.map((d,i)=>({...d,i})).filter(d=>d.category===cat && (!q || (d.title+' '+d.subtitle+' '+d.category).toLowerCase().includes(q)));
    if(!items.length) return;
    menu.insertAdjacentHTML('beforeend',`<div class="cat">${icons[cat]||'⭐'} ${esc(cat)}</div>`);
    items.forEach(d=>menu.insertAdjacentHTML('beforeend',`<button class="item ${d.i===active?'active':''}" onclick="openConcept(${d.i})"><span class="emoji">${icons[d.category]||'⭐'}</span><span><div class="itxt">${esc(d.title)}</div><div class="isub">${esc(d.subtitle||'')}</div></span></button>`));
  });
}
function showHome(){ openConcept(active||0); }
function openCategory(cat){const i=DATA.findIndex(d=>d.category===cat); if(i>=0) openConcept(i)}
function openConcept(i){active=i; currentTab=2; renderMenu(); renderMain(); window.scrollTo({top:0,behavior:'smooth'});}
function setViewMode(m){viewMode=m;renderMain();}
function modeButtons(d){
 if(d.modeType==='multiplier'){
  const m=modeState[d.title]||d.defaultMode; return `<div class="modebar"><button class="modebtn ${m==='rise'?'active':''}" onclick="setMode('rise')">AD rise</button><button class="modebtn ${m==='fall'?'active':''}" onclick="setMode('fall')">AD fall</button></div>`;
 }
 if(d.modeType==='circular'){
  const m=modeState[d.title]||d.defaultMode; return `<div class="modebar"><button class="modebtn ${m==='jgtw'?'active':''}" onclick="setMode('jgtw')">J &gt; W</button><button class="modebtn ${m==='jltw'?'active':''}" onclick="setMode('jltw')">J &lt; W</button></div>`;
 }
 return '';
}
function setMode(m){modeState[DATA[active].title]=m; renderMain();}
function renderStats(secs){ return ''; }
function list(arr){
 if(!arr || !arr.filter(Boolean).length) return `<div class="empty">Empty for now.</div>`;
 const use = arr;
 return `<div class="chain">${use.map((s,i)=>`<div class="step"><div class="num">${i+1}</div><div class="steptext">${fmt(s)}</div></div>`).join('')}</div>`;
}
function diagram(arr){if(!arr||!arr.length)return `<div class="empty">Empty for now.</div>`; return `<div class="diagramBox"><div class="diagramLine">${arr.map(s=>'• '+esc(s)).join('\n')}</div></div>`}
function tabContent(d,secs){
 const arr=secs[currentTab]||[];
 if(currentTab===6) return diagram(arr);
 if(currentTab===8) return arr.length?`<div class="exampara">${fmt(arr[0])}</div>`:`<div class="empty">Empty for now.</div>`;
 return list(arr);
}
function renderGoalsStrip(){
 return `<div class="goalStrip">
  <div class="goal"><b>GDP + Growth</b><small>Real GDP, RNY, actual growth and potential growth.</small></div>
  <div class="goal"><b>GPL + Inflation</b><small>General price level, inflation, deflation and purchasing power.</small></div>
  <div class="goal"><b>Unemployment</b><small>Jobs, employment, derived demand for labour and income.</small></div>
  <div class="goal"><b>BOT</b><small>Exports minus imports; external stability and trade effects.</small></div>
 </div>`;
}
function card(cls,title,html,span=false){return `<section class="sectionCard ${cls} ${span?'fullspan':''}"><h3>${title}</h3>${html}</section>`}
function plain(d){const secs=standard(d);return `${d.title}
${d.subtitle||''}

`+sectionNames.map((n,i)=>`${n}
${(secs[i]||[]).map(x=>'- '+x).join('\n')||''}`).join('\n\n')}
function copyCurrent(){navigator.clipboard.writeText(plain(DATA[active]));showToast('Copied content!')}
function togglePlain(){const p=document.getElementById('copybox');p.style.display=p.style.display==='block'?'none':'block'}
function renderMain(){
 const d=DATA[active], secs=standard(d);
 main.innerHTML=`<div class="top"><div><span class="tag">${icons[d.category]||'⭐'} ${esc(d.category)}</span><h2 class="title">${esc(d.title)}</h2><p class="use">${esc((d.subtitle||'').replace(/BOT/g,'BOT').replace(/bot/g,'bot'))}</p></div><div class="controls"><button class="btn" onclick="copyCurrent()">Copy</button><button class="btn light" onclick="togglePlain()">Plain text</button></div></div>${modeButtons(d)}${renderStats(secs)}${renderGoalsStrip()}<div class="allSections">
 ${card('',sectionNames[0],list(secs[0]))}
 ${card('',sectionNames[1],list(secs[1]))}
 ${card('growth goalFx',sectionNames[2],list(secs[2]))}
 ${card('infl goalFx',sectionNames[3],list(secs[3]))}
 ${card('unemp goalFx',sectionNames[4],list(secs[4]))}
 ${card('bot goalFx',sectionNames[5],list(secs[5]))}
 ${card('diagram',sectionNames[6],diagram(secs[6]),true)}
 ${card('eval',sectionNames[7],list(secs[7]),true)}
 ${card('',sectionNames[8],secs[8].length?`<div class="exampara">${fmt(secs[8][0])}</div>`:`<div class="empty">Empty for now.</div>`,true)}
 </div><pre id="copybox" class="copybox">${esc(plain(d))}</pre>`;
}

function openEditor(){
  const modal=document.getElementById('editorModal');
  const ta=document.getElementById('htmlEditor');
  ta.value='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  modal.classList.add('show');
}
function closeEditor(){document.getElementById('editorModal').classList.remove('show')}
function copyHtmlFromEditor(){navigator.clipboard.writeText(document.getElementById('htmlEditor').value);showToast('HTML copied!')}
search.addEventListener('input',renderMenu);renderMenu();showHome();
</script>
</body>
